
name: Deploy Azure VM + DR Setup (ASR)

on:
  workflow_dispatch:

env:
  RESOURCE_GROUP: TRrsgp
  LOCATION: "Korea Central"
  TEMPLATE_FILE: "infra/asr-complete.json"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy ARM Template
      uses: azure/arm-deploy@v2
      with:
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        resourceGroupName: ${{ env.RESOURCE_GROUP }}
        template: ${{ env.TEMPLATE_FILE }}
        parameters: |
          adminUsername=adminuser
          adminPassword=${{ secrets.VM_ADMIN_PASSWORD }}
          vmName=vm-rsv
          vaultName=dr-vault-eastus
          targetVnetId=/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/TRrsgp/providers/Microsoft.Network/virtualNetworks/primary-vnet

    - name: Deployment Complete
      run: echo "Azure VM and DR replication setup deployed successfully."
